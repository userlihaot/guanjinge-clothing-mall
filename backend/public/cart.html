<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物车 - 观锦阁</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
<header class="header"><div class="header-inner">
  <div class="logo" onclick="location.href='/'" style="cursor:pointer">观锦阁<span>| 购物车</span></div>
  <div class="actions"><a href="/" style="color:var(--gold)">继续购物</a></div>
</div></header>

<div class="container" style="padding-top:20px" v-if="!Auth.isLoggedIn()">
  <el-empty description="请先登录"><el-button type="primary" @click="goLogin" style="background:var(--primary)">去登录</el-button></el-empty>
</div>

<div class="container" style="padding-top:20px" v-else>
  <h2 style="margin-bottom:20px">我的购物车</h2>
  <el-table :data="cartItems" v-if="cartItems.length" @selection-change="handleSelect" ref="tableRef" row-key="cartId">
    <el-table-column type="selection" width="50"></el-table-column>
    <el-table-column label="商品" width="400">
      <template #default="{row}">
        <div style="display:flex;align-items:center;gap:12px">
          <img :src="row.product_image" style="width:80px;height:80px;object-fit:cover;border-radius:4px">
          <div>
            <div style="font-weight:bold">{{row.product_name}}</div>
            <div style="color:#999;font-size:12px" v-if="row.sku_name">{{row.sku_name}}</div>
          </div>
        </div>
      </template>
    </el-table-column>
    <el-table-column label="单价" width="120"><template #default="{row}">¥{{row.price}}</template></el-table-column>
    <el-table-column label="数量" width="160">
      <template #default="{row}">
        <el-input-number v-model="row.quantity" :min="1" :max="row.stock" size="small" @change="(v)=>updateQty(row.cartId,v)"></el-input-number>
      </template>
    </el-table-column>
    <el-table-column label="小计" width="120"><template #default="{row}">¥{{(row.price*row.quantity).toFixed(2)}}</template></el-table-column>
    <el-table-column label="操作" width="80">
      <template #default="{row}"><el-button type="danger" size="small" @click="removeItem(row.cartId)">删除</el-button></template>
    </el-table-column>
  </el-table>

  <el-empty v-else description="购物车空空如也~"><el-button @click="goHome" style="background:var(--primary);color:#fff">去逛逛</el-button></el-empty>

  <div v-if="cartItems.length" style="margin-top:20px;padding:16px 20px;background:#fff;border-radius:8px;display:flex;justify-content:flex-end;align-items:center;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)">
    <span>已选 <b style="color:var(--red)">{{selectedItems.length}}</b> 件</span>
    <span>合计：<b style="color:var(--red);font-size:24px">¥{{totalPrice}}</b></span>
    <el-button size="small" @click="batchRemove" :disabled="!selectedItems.length">删除选中</el-button>
    <el-button size="large" type="danger" @click="checkout" :disabled="!selectedItems.length" style="background:var(--red)">去结算</el-button>
  </div>

  <!-- 结算对话框 -->
  <el-dialog v-model="showCheckout" title="确认订单" width="600px">
    <div style="margin-bottom:16px">
      <strong>收货地址：</strong>
      <el-select v-model="selectedAddressId" placeholder="请选择地址" style="width:100%">
        <el-option v-for="a in addresses" :key="a.id" :value="a.id" :label="a.receiver_name+' '+a.receiver_phone+' '+a.province+a.city+a.district+a.detail"></el-option>
      </el-select>
      <el-button size="small" style="margin-top:8px" @click="showAddrForm=true">+ 新增地址</el-button>
    </div>
    <div style="margin-bottom:16px"><strong>买家留言：</strong><el-input v-model="buyerMessage" placeholder="选填"></el-input></div>
    <div style="background:var(--bg-cream);padding:12px;border-radius:8px">
      <div>商品金额：¥{{totalPrice}}</div>
      <div>运费：¥{{freight}} <span style="color:var(--green);font-size:12px">(满299包邮)</span></div>
      <div style="font-size:18px;font-weight:bold;margin-top:8px">实付：<span style="color:var(--red)">¥{{(parseFloat(totalPrice)+freight).toFixed(2)}}</span></div>
    </div>
    <template #footer>
      <el-button @click="showCheckout=false">取消</el-button>
      <el-button type="danger" @click="submitOrder" :loading="submitting">提交订单</el-button>
    </template>
  </el-dialog>

  <!-- 新增地址对话框 -->
  <el-dialog v-model="showAddrForm" title="新增地址" width="400px">
    <el-form :model="addrForm" label-width="80px">
      <el-form-item label="收货人"><el-input v-model="addrForm.receiverName"></el-input></el-form-item>
      <el-form-item label="手机号"><el-input v-model="addrForm.receiverPhone"></el-input></el-form-item>
      <el-form-item label="省"><el-input v-model="addrForm.province"></el-input></el-form-item>
      <el-form-item label="市"><el-input v-model="addrForm.city"></el-input></el-form-item>
      <el-form-item label="区"><el-input v-model="addrForm.district"></el-input></el-form-item>
      <el-form-item label="详细地址"><el-input v-model="addrForm.detail" type="textarea"></el-input></el-form-item>
    </el-form>
    <template #footer><el-button @click="showAddrForm=false">取消</el-button><el-button type="primary" @click="saveAddr">保存</el-button></template>
  </el-dialog>
</div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;
const App = {
  setup() {
    const cartItems = ref([]);
    const selectedItems = ref([]);
    const showCheckout = ref(false);
    const showAddrForm = ref(false);
    const addresses = ref([]);
    const selectedAddressId = ref(null);
    const buyerMessage = ref('');
    const submitting = ref(false);
    const addrForm = reactive({ receiverName:'', receiverPhone:'', province:'', city:'', district:'', detail:'' });

    const totalPrice = computed(() => selectedItems.value.reduce((s,i) => s + i.price * i.quantity, 0).toFixed(2));
    const freight = computed(() => parseFloat(totalPrice.value) >= 299 ? 0 : 15);

    onMounted(async () => {
      if (!Auth.isLoggedIn()) return;
      const res = await cartApi.getList();
      if (res.code === 200) cartItems.value = res.data;
    });

    const handleSelect = (items) => { selectedItems.value = items; };
    const updateQty = async (cartId, qty) => { await cartApi.updateQuantity({ cartId, quantity: qty }); };
    const removeItem = async (cartId) => {
      await cartApi.remove([cartId]);
      cartItems.value = cartItems.value.filter(i => i.cartId !== cartId);
    };
    const batchRemove = async () => {
      const ids = selectedItems.value.map(i => i.cartId);
      await cartApi.remove(ids);
      cartItems.value = cartItems.value.filter(i => !ids.includes(i.cartId));
      selectedItems.value = [];
    };

    const checkout = async () => {
      const addrRes = await addressApi.getList();
      if (addrRes.code === 200) {
        addresses.value = addrRes.data;
        if (addrRes.data.length) selectedAddressId.value = addrRes.data[0].id;
      }
      showCheckout.value = true;
    };

    const saveAddr = async () => {
      await addressApi.add(addrForm);
      showAddrForm.value = false;
      const addrRes = await addressApi.getList();
      if (addrRes.code === 200) addresses.value = addrRes.data;
      ElementPlus.ElMessage.success('地址已添加');
    };

    const submitOrder = async () => {
      if (!selectedAddressId.value) return ElementPlus.ElMessage.warning('请选择地址');
      submitting.value = true;
      const res = await orderApi.create({
        addressId: selectedAddressId.value,
        cartItemIds: selectedItems.value.map(i => i.cartId),
        buyerMessage: buyerMessage.value
      });
      submitting.value = false;
      if (res.code === 200) {
        ElementPlus.ElMessage.success('下单成功！');
        location.href = '/orders.html';
      } else {
        ElementPlus.ElMessage.error(res.message);
      }
    };

    return { cartItems, selectedItems, showCheckout, showAddrForm, addresses, selectedAddressId, buyerMessage, submitting, addrForm, totalPrice, freight, handleSelect, updateQty, removeItem, batchRemove, checkout, saveAddr, submitOrder, goHome() { location.href='/'; }, goLogin() { location.href='/login.html'; }, Auth };
  }
};
const app = createApp(App); app.use(ElementPlus); app.mount('#app');
</script>
</body>
</html>
